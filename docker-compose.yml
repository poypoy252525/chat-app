services:
  backend:
    build: ./backend
    # ports:
    #   - "8000:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - backend
    restart: always

volumes:
  static_volume:
